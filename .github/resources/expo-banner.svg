<svg fill="none" viewBox="0 0 800 400" width="100%" height="auto"
    xmlns="http://www.w3.org/2000/svg" style="height: auto">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                @keyframes pulse {
                    0%, 100% { transform: scale(1); }
                    50%      { transform: scale(1.05); }
                }
                @keyframes breathe {
                    0%, 100% { opacity: 0.30; transform: scale(1); }
                    50%      { opacity: 0.70; transform: scale(1.12); }
                }
                @keyframes float-a {
                    0%, 100% { transform: translate3d(0, 0, 0); }
                    50%      { transform: translate3d(0, -10px, 0); }
                }
                @keyframes float-b {
                    0%, 100% { transform: translate3d(0, 0, 0); }
                    50%      { transform: translate3d(0,  -8px, 0); }
                }
                @keyframes float-c {
                    0%, 100% { transform: translate3d(0, 0, 0); }
                    50%      { transform: translate3d(0, -12px, 0); }
                }
                @keyframes twinkle {
                    0%, 100% { opacity: 0.15; }
                    50%      { opacity: 0.9; }
                }
                @keyframes shimmer {
                    0%   { transform: translateX(-260px); }
                    100% { transform: translateX(260px); }
                }
                @keyframes rise {
                    0%, 100% { opacity: 0; transform: translateY(0); }
                    50%      { opacity: 0.6; }
                    100%     { opacity: 0; transform: translateY(-40px); }
                }

                svg .logo-mark {
                    transform-origin: 400px 130px;
                    transform-box: view-box;
                    animation: pulse 4s ease-in-out infinite;
                }
                svg .halo {
                    transform-origin: 400px 130px;
                    transform-box: view-box;
                    animation: breathe 4s ease-in-out infinite;
                }
                svg .wordmark-shimmer {
                    animation: shimmer 3.6s ease-in-out infinite;
                }

                svg .pill-ios     { animation: float-a 3.5s ease-in-out infinite; }
                svg .pill-android { animation: float-b 4.2s ease-in-out infinite; }
                svg .pill-web     { animation: float-c 3.8s ease-in-out infinite; }

                svg .star-1 { animation: twinkle 2.4s ease-in-out infinite; }
                svg .star-2 { animation: twinkle 3.1s ease-in-out 0.5s infinite; }
                svg .star-3 { animation: twinkle 2.8s ease-in-out 1.1s infinite; }
                svg .star-4 { animation: twinkle 3.4s ease-in-out 1.7s infinite; }
                svg .star-5 { animation: twinkle 2.6s ease-in-out 0.3s infinite; }
                svg .star-6 { animation: twinkle 3.7s ease-in-out 2.0s infinite; }
                svg .star-7 { animation: twinkle 2.9s ease-in-out 0.9s infinite; }
                svg .star-8 { animation: twinkle 3.2s ease-in-out 1.4s infinite; }
            </style>
            <svg width="100%" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="expoGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="#654CF7" />
                        <stop offset="100%" stop-color="#D957D9" />
                    </linearGradient>
                    <radialGradient id="bgGlow" cx="400" cy="170" r="320" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#F3EEFF" stop-opacity="1" />
                        <stop offset="100%" stop-color="#F3EEFF" stop-opacity="0" />
                    </radialGradient>
                    <radialGradient id="haloGrad" cx="400" cy="130" r="120" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#A26AF5" stop-opacity="0.55" />
                        <stop offset="60%"  stop-color="#A26AF5" stop-opacity="0.18" />
                        <stop offset="100%" stop-color="#A26AF5" stop-opacity="0" />
                    </radialGradient>
                    <linearGradient id="shimmerGrad" x1="0" y1="0.5" x2="1" y2="0.5">
                        <stop offset="0%"   stop-color="#D957D9" stop-opacity="0" />
                        <stop offset="45%"  stop-color="#D957D9" stop-opacity="0.55" />
                        <stop offset="55%"  stop-color="#654CF7" stop-opacity="0.55" />
                        <stop offset="100%" stop-color="#654CF7" stop-opacity="0" />
                    </linearGradient>
                    <filter id="pillShadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                        <feOffset dy="2" />
                        <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
                        <feMerge>
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <!-- Reusable "expo" wordmark from the official Expo brand asset (docs/public/static/images/expo-logo.svg) -->
                    <symbol id="expoWordmark" viewBox="0 0 71 20">
                        <path d="M9.258 6.342c.158-.23.331-.26.472-.26.14 0 .374.03.532.26 2.06 2.806 6.332 10.208 6.727 10.611.585.597 1.388.225 1.854-.452.46-.667.587-1.135.587-1.634 0-.34-6.653-12.614-7.324-13.636C11.462.248 11.252 0 10.15 0h-.825c-1.1 0-1.259.248-1.903 1.23C6.75 2.254.097 14.528.097 14.868c0 .5.127.967.587 1.634.466.677 1.269 1.05 1.854.452.395-.403 4.661-7.805 6.72-10.61zm14.941-5.237v15.344h9.35v-3.113h-6.125v-3.244h5.45V6.98h-5.45V4.218h6.125V1.105h-9.35zM46.25 16.449l-3.88-5.568 3.619-5.195h-3.662L40.54 8.23l-1.765-2.543h-3.706l3.618 5.217-3.857 5.546h3.661l2.027-2.915 2.027 2.915h3.705zm7.572-10.982c-1.482 0-2.637.614-3.378 1.732V5.686H47.37V20h3.073v-5.063c.74 1.117 1.896 1.731 3.378 1.731 2.768 0 4.97-2.52 4.97-5.611 0-3.091-2.202-5.59-4.97-5.59zm-.697 8.242c-1.504 0-2.681-1.14-2.681-2.652 0-1.49 1.177-2.653 2.68-2.653 1.483 0 2.681 1.184 2.681 2.653 0 1.49-1.198 2.652-2.68 2.652zm12.188-8.242c-3.16 0-5.558 2.411-5.558 5.612 0 3.2 2.397 5.59 5.557 5.59 3.139 0 5.558-2.39 5.558-5.59 0-3.2-2.42-5.612-5.558-5.612zm0 2.96c1.438 0 2.55 1.117 2.55 2.652 0 1.49-1.112 2.63-2.55 2.63-1.46 0-2.55-1.14-2.55-2.63 0-1.535 1.09-2.653 2.55-2.653z" fill="#000020"/>
                    </symbol>

                    <!-- Clip path matching the wordmark, used for the shimmer effect -->
                    <clipPath id="wordmarkClip">
                        <use href="#expoWordmark" x="280" y="215" width="240" height="68" />
                    </clipPath>
                </defs>

                <!-- Background glow -->
                <rect width="800" height="400" fill="url(#bgGlow)" />

                <!-- Twinkling stars -->
                <circle class="star-1" cx="120" cy="80"  r="2.5" fill="#A26AF5" />
                <circle class="star-2" cx="680" cy="100" r="2"   fill="#D957D9" />
                <circle class="star-3" cx="70"  cy="240" r="2"   fill="#654CF7" />
                <circle class="star-4" cx="730" cy="280" r="2.5" fill="#A26AF5" />
                <circle class="star-5" cx="200" cy="360" r="1.5" fill="#D957D9" />
                <circle class="star-6" cx="600" cy="40"  r="1.5" fill="#654CF7" />
                <circle class="star-7" cx="40"  cy="160" r="1.5" fill="#D957D9" />
                <circle class="star-8" cx="760" cy="180" r="1.5" fill="#654CF7" />

                <!-- Halo behind the brand mark -->
                <circle class="halo" cx="400" cy="130" r="100" fill="url(#haloGrad)" />

                <!-- Platform pills floating around the mark -->
                <g class="pill-ios">
                    <rect x="350" y="22" width="100" height="34" rx="17" fill="white" stroke="url(#expoGrad)" stroke-width="1.6" filter="url(#pillShadow)" />
                    <text x="400" y="44" text-anchor="middle" fill="#1F1F2E" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600">iOS</text>
                </g>
                <g class="pill-android">
                    <rect x="566" y="178" width="118" height="34" rx="17" fill="white" stroke="url(#expoGrad)" stroke-width="1.6" filter="url(#pillShadow)" />
                    <text x="625" y="200" text-anchor="middle" fill="#1F1F2E" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600">Android</text>
                </g>
                <g class="pill-web">
                    <rect x="116" y="178" width="92" height="34" rx="17" fill="white" stroke="url(#expoGrad)" stroke-width="1.6" filter="url(#pillShadow)" />
                    <text x="162" y="200" text-anchor="middle" fill="#1F1F2E" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600">Web</text>
                </g>

                <!-- Expo brand mark (the "A"), centered at (400, 130) -->
                <g class="logo-mark">
                    <g transform="translate(400 130) scale(0.36) translate(-770 -484)">
                        <path d="M626.199 586.859C626.715 593.628 628.959 600.436 634.815 609.569C641.775 620.414 653.727 626.366 662.451 616.812C668.331 610.361 731.979 491.942 762.651 447.057C763.493 445.774 764.613 444.726 765.917 444.002C767.22 443.278 768.669 442.901 770.139 442.901C771.61 442.901 773.058 443.278 774.362 444.002C775.665 444.726 776.786 445.774 777.627 447.057C808.299 491.942 871.947 610.361 877.827 616.812C886.551 626.366 898.503 620.414 905.463 609.569C912.303 598.904 914.199 591.431 914.199 583.435C914.199 577.994 815.079 381.646 805.095 365.296C795.495 349.585 792.567 346.162 776.331 345.6H763.947C747.711 346.162 744.783 349.573 735.171 365.296C725.403 381.301 630.159 569.922 626.199 582.848V586.859Z" fill="#000020"/>
                    </g>
                </g>

                <!-- "expo" wordmark in dark brand color -->
                <use href="#expoWordmark" x="280" y="215" width="240" height="68" />

                <!-- Shimmer band clipped to the wordmark — sweeps across it -->
                <g clip-path="url(#wordmarkClip)">
                    <rect class="wordmark-shimmer" x="0" y="200" width="180" height="100" fill="url(#shimmerGrad)" />
                </g>

                <!-- Tagline -->
                <text x="400" y="320" text-anchor="middle" fill="#5C5C71" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="500" letter-spacing="0.2">Universal native apps for iOS, Android, and the web</text>
            </svg>
        </div>
    </foreignObject>
</svg>
